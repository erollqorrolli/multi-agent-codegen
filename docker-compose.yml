services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: codegen
      POSTGRES_PASSWORD: codegen
      POSTGRES_DB: codegen
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codegen"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    environment:
      # Point at the compose DB regardless of host .env value.
      DATABASE_URL: postgresql+asyncpg://codegen:codegen@db:5432/codegen
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
